<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pitch Detector</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Bebas+Neue&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --border: #1e1e2e;
    --accent: #e8ff47;
    --dim: #3a3a50;
    --text: #c8c8e0;
    --muted: #555570;
  }

 body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;        /* ← was center; centering clips overflow */
  overflow-x: hidden;                 /* ← was overflow:hidden; allow y scrolling */
  padding: 40px 0 60px;              /* ← top breathing room + bottom safe gap */
}

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.4;
  }

 .wrapper {
  width: min(480px, 92vw);
  display: flex;
  flex-direction: column;
  gap: 2px;
  padding-bottom: env(safe-area-inset-bottom, 16px); /* ← Android/iOS notch safety */
}

  header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 20px;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.4rem;
    letter-spacing: 0.12em;
    color: var(--accent);
  }

  .subtitle {
    font-size: 0.65rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  /* Main pitch display */
  .pitch-card {
    background: var(--panel);
    border: 1px solid var(--border);
    padding: 40px 32px 32px;
    position: relative;
    overflow: hidden;
  }

  .pitch-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.15s ease;
  }

  .pitch-card.active::after { transform: scaleX(1); }

  .note-name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(5rem, 20vw, 9rem);
    line-height: 0.9;
    color: var(--accent);
    transition: color 0.1s;
    letter-spacing: -0.02em;
  }

  .note-name.silent { color: var(--dim); }

  .note-octave {
    font-size: clamp(2rem, 8vw, 3.5rem);
    color: var(--muted);
    vertical-align: super;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
  }

  .freq-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-top: 16px;
  }

  .freq-value {
    font-size: 1.8rem;
    font-weight: 700;
    color: var(--text);
    letter-spacing: -0.02em;
    min-width: 100px;
  }

  .freq-unit {
    font-size: 0.7rem;
    color: var(--muted);
    letter-spacing: 0.15em;
  }

  /* Cents deviation bar */
  .cents-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: none;
    padding: 16px 32px 20px;
  }

  .cents-label {
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    justify-content: space-between;
  }

  .cents-track {
    height: 4px;
    background: var(--border);
    position: relative;
  }

  .cents-center {
    position: absolute;
    top: -4px;
    left: 50%;
    transform: translateX(-50%);
    width: 1px;
    height: 12px;
    background: var(--muted);
  }

  .cents-needle {
    position: absolute;
    top: -4px;
    width: 3px;
    height: 12px;
    background: var(--accent);
    transform: translateX(-50%);
    transition: left 0.08s ease, background 0.2s;
    left: 50%;
  }

  .cents-needle.in-tune { background: #47ff8a; }
  .cents-needle.silent { background: var(--dim); }

  .cents-value {
    text-align: center;
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 8px;
    letter-spacing: 0.1em;
  }

  /* Volume meter */
  .meta-row {
    display: flex;
    gap: 2px;
  }

  .meta-card {
    flex: 1;
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: none;
    padding: 14px 20px;
  }

  .meta-label {
    font-size: 0.55rem;
    color: var(--muted);
    letter-spacing: 0.2em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .vol-bar {
    height: 3px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .vol-fill {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.05s ease;
  }

  .clarity-value {
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text);
  }

  /* Waveform canvas */
  .waveform-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-top: none;
  }

  canvas {
    display: block;
    width: 100%;
    height: 64px;
  }

  /* Start button */
  .start-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 16px;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    margin-top: 2px;
  }

  .start-btn:hover { background: var(--accent); color: var(--bg); }
  .start-btn:disabled { border-color: var(--dim); color: var(--dim); cursor: default; }
  .start-btn:disabled:hover { background: transparent; color: var(--dim); }

  .status {
    text-align: center;
    font-size: 0.6rem;
    color: var(--muted);
    letter-spacing: 0.15em;
    margin-top: 14px;
  }

  .dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--muted);
    margin-right: 6px;
    vertical-align: middle;
  }

  .dot.live { background: #47ff8a; animation: pulse 1.2s infinite; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }
  /* ── Piano keyboard ─────────────────────────────────────────── */
.piano-wrap {
  margin-top: 2px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 20px 16px 16px;
}

.piano-label {
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  margin-bottom: 14px;
}

.piano {
  position: relative;
  display: flex;
  height: 90px;
}

.key {
  position: relative;
  border: none;
  cursor: pointer;
  transition: background 0.07s, transform 0.07s;
  outline: none;
}

/* White keys */
.key.white {
  flex: 1;
  background: #e8e8d8;
  border: 1px solid #aaa;
  border-radius: 0 0 4px 4px;
  z-index: 1;
}

.key.white:hover  { background: #ffffee; }
.key.white:active { background: var(--accent); transform: scaleY(1.03); transform-origin: top; }
.key.white.playing { background: var(--accent); }

/* Black keys */
.key.black {
  position: absolute;
  width: 7%;
  height: 58%;
  background: #1a1a24;
  border: 1px solid #000;
  border-radius: 0 0 3px 3px;
  z-index: 2;
  top: 0;
}

.key.black:hover  { background: #2e2e40; }
.key.black:active { background: #b8cc30; }
.key.black.playing { background: #b8cc30; }

.key-label {
  position: absolute;
  bottom: 5px;
  left: 50%;
  transform: translateX(-50%);
  font-family: 'Space Mono', monospace;
  font-size: 0.45rem;
  color: var(--muted);
  pointer-events: none;
  white-space: nowrap;
}

.key.white .key-label { color: #888; }
.key.black .key-label { color: #555; }
/* ── Audio file upload ───────────────────────────────────────── */
.upload-wrap {
  margin-top: 2px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
  flex-wrap: wrap;        /* ← allows button to drop to next line if needed */
  min-width: 0;           /* ← prevents flex child from forcing parent wider */
}

.upload-label {
  font-size: 0.55rem;
  color: var(--muted);
  letter-spacing: 0.2em;
  text-transform: uppercase;
  white-space: nowrap;
}
.upload-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  padding: 8px 14px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  white-space: nowrap;
  flex-shrink: 0;         /* ← button never squishes; filename truncates instead */
}

.upload-btn:hover { border-color: var(--accent); color: var(--accent); }

.upload-filename {
  font-size: 0.6rem;
  color: var(--muted);
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
  flex: 1;
  min-width: 0;           /* ← critical: lets ellipsis actually trigger in flex */
  max-width: 100%;
}
/* ── Playback controls ───────────────────────────────────────── */
.playback-wrap {
  margin-top: 2px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 16px;
}

.play-btn {
  background: transparent;
  border: 1px solid var(--accent);
  color: var(--accent);
  font-family: 'Space Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  padding: 9px 18px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  min-width: 90px;
  text-align: center;
}

.play-btn:hover  { background: var(--accent); color: var(--bg); }
.play-btn:disabled { border-color: var(--dim); color: var(--dim); cursor: default; }
.play-btn:disabled:hover { background: transparent; color: var(--dim); }

.playback-time {
  font-size: 0.65rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  min-width: 90px;
}
/* ── Scrub bar ───────────────────────────────────────────────── */
.scrub-wrap {
  margin-top: 2px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 14px 20px;
}

.scrub-slider {
  width: 100%;
  appearance: none;
  -webkit-appearance: none;
  height: 3px;
  background: var(--border);
  outline: none;
  cursor: pointer;
  accent-color: var(--accent);
}

.scrub-slider:disabled {
  opacity: 0.3;
  cursor: default;
}

.scrub-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width: 12px;
  height: 12px;
  border-radius: 50%;
  background: var(--accent);
  cursor: pointer;
}

.scrub-slider:disabled::-webkit-slider-thumb {
  background: var(--muted);
}
/* ── A/B loop markers ────────────────────────────────────────── */
.ab-wrap {
  margin-top: 2px;
  background: var(--panel);
  border: 1px solid var(--border);
  padding: 14px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.ab-btn {
  background: transparent;
  border: 1px solid var(--dim);
  color: var(--text);
  font-family: 'Space Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  padding: 7px 14px;
  cursor: pointer;
  transition: border-color 0.15s, color 0.15s;
  flex-shrink: 0;
}

.ab-btn:hover    { border-color: var(--accent); color: var(--accent); }
.ab-btn:disabled { border-color: var(--dim); color: var(--dim); cursor: default; }
.ab-btn:disabled:hover { border-color: var(--dim); color: var(--dim); }

.ab-btn.set { border-color: var(--accent); color: var(--accent); }

.ab-display {
  font-size: 0.6rem;
  color: var(--muted);
  letter-spacing: 0.1em;
  flex: 1;
  min-width: 0;
}

.ab-display span { color: var(--text); }

.ab-clear {
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: 'Space Mono', monospace;
  font-size: 0.6rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  padding: 4px;
  flex-shrink: 0;
}

.ab-clear:hover { color: var(--accent); }
</style>
</head>
<body>
<!-- deploy trigger: initial setup -->
<div class="wrapper">
  <header>
    <div class="title">PITCH</div>
    <div class="subtitle">Real-time detector</div>
  </header>

  <div class="pitch-card" id="pitchCard">
    <div class="note-name silent" id="noteName">—<span class="note-octave" id="noteOctave"></span></div>
    <div class="freq-row">
      <div class="freq-value" id="freqValue">—</div>
      <div class="freq-unit">HZ</div>
    </div>
  </div>

  <div class="cents-section">
    <div class="cents-label">
      <span>♭ FLAT</span>
      <span>CENTS DEVIATION</span>
      <span>SHARP ♯</span>
    </div>
    <div class="cents-track">
      <div class="cents-center"></div>
      <div class="cents-needle silent" id="centsNeedle"></div>
    </div>
    <div class="cents-value" id="centsValue">— ¢</div>
  </div>

  <div class="meta-row">
    <div class="meta-card">
      <div class="meta-label">Volume</div>
      <div class="vol-bar"><div class="vol-fill" id="volFill"></div></div>
    </div>
    <div class="meta-card">
      <div class="meta-label">Clarity</div>
      <div class="clarity-value" id="clarityValue">—</div>
    </div>
  </div>

  <div class="waveform-card">
    <canvas id="waveCanvas"></canvas>
  </div>
<!-- Audio file upload -->
<div class="upload-wrap">
  <!-- Playback controls -->
<div class="playback-wrap">
  <!-- Scrub bar -->
<div class="scrub-wrap">
  <!-- A/B loop markers -->
<div class="ab-wrap">
  <button class="ab-btn" id="setABtn"   disabled onclick="setLoopPoint('A')">Set A</button>
  <button class="ab-btn" id="setBBtn"   disabled onclick="setLoopPoint('B')">Set B</button>
  <div class="ab-display" id="abDisplay">A: <span>—</span> &nbsp; B: <span>—</span></div>
  <button class="ab-clear" id="abClear" onclick="clearLoopPoints()">✕ clear</button>
</div>
  <input type="range" class="scrub-slider" id="scrubSlider"
         min="0" max="100" step="0.1" value="0" disabled>
</div>
  <button class="play-btn" id="playPauseBtn" disabled onclick="togglePlayback()">▶ Play</button>
  <span class="playback-time" id="playbackTime">0:00 / 0:00</span>
</div>
  <span class="upload-label">Audio file</span>
  <button class="upload-btn" onclick="document.getElementById('audioFileInput').click()">↑ Load MP3 / WAV</button>
  <input id="audioFileInput" type="file" accept="audio/mp3,audio/wav,audio/*" style="display:none">
  <span class="upload-filename" id="uploadFilename">No file loaded</span>
</div>
  <button class="start-btn" id="startBtn" onclick="startAudio()">▶ &nbsp; Start microphone</button>
  <!-- Piano keyboard C4–C5 -->
<div class="piano-wrap">
  <div class="piano-label">Keyboard — C4 to C5</div>
  <div class="piano" id="pianoKeys"></div>
</div>

  <div class="status">
    <span class="dot" id="statusDot"></span>
    <span id="statusText">Awaiting microphone access</span>
  </div>
</div>

<script>
// ── Note table ────────────────────────────────────────────────
const NOTE_NAMES = ['C','C#','D','D#','E','F','F#','G','G#','A','A#','B'];

function freqToNote(freq) {
  if (freq <= 0) return null;
  const semitones = 12 * Math.log2(freq / 440) + 57; // A4=440Hz → semitone 57 from C0
  const midi = Math.round(semitones);
  const cents = Math.round((semitones - midi) * 100);
  const octave = Math.floor(midi / 12);
  const name = NOTE_NAMES[midi % 12];
  return { name, octave, cents };
}

// ── YIN pitch detection ────────────────────────────────────────
function yin(buf, sampleRate) {
  const TAU_MIN = Math.floor(sampleRate / 1200); // ~1200 Hz max
  const TAU_MAX = Math.floor(sampleRate / 50);   // ~50 Hz min
  const threshold = 0.12;
  const N = buf.length;

  // Step 1 & 2: difference function
  const diff = new Float32Array(TAU_MAX);
  for (let tau = 1; tau < TAU_MAX; tau++) {
    let s = 0;
    for (let i = 0; i < TAU_MAX; i++) {
      const d = buf[i] - buf[i + tau];
      s += d * d;
    }
    diff[tau] = s;
  }

  // Step 3: cumulative mean normalised difference
  const cmnd = new Float32Array(TAU_MAX);
  cmnd[0] = 1;
  let runSum = 0;
  for (let tau = 1; tau < TAU_MAX; tau++) {
    runSum += diff[tau];
    cmnd[tau] = diff[tau] * tau / runSum;
  }

  // Step 4: absolute threshold
  let tau = TAU_MIN;
  while (tau < TAU_MAX) {
    if (cmnd[tau] < threshold) {
      while (tau + 1 < TAU_MAX && cmnd[tau + 1] < cmnd[tau]) tau++;
      break;
    }
    tau++;
  }

  if (tau === TAU_MAX || cmnd[tau] >= threshold) return { freq: -1, clarity: 0 };

  // Step 5: parabolic interpolation
  const x0 = tau > 1 ? tau - 1 : tau;
  const x2 = tau + 1 < TAU_MAX ? tau + 1 : tau;
  let betterTau;
  if (x0 === tau) {
    betterTau = cmnd[tau] <= cmnd[x2] ? tau : x2;
  } else if (x2 === tau) {
    betterTau = cmnd[tau] <= cmnd[x0] ? tau : x0;
  } else {
    const s0 = cmnd[x0], s1 = cmnd[tau], s2 = cmnd[x2];
    betterTau = tau + (s2 - s0) / (2 * (2 * s1 - s2 - s0));
  }

  return { freq: sampleRate / betterTau, clarity: 1 - cmnd[tau] };
}

// ── RMS volume ────────────────────────────────────────────────
function rms(buf) {
  let sum = 0;
  for (let i = 0; i < buf.length; i++) sum += buf[i] * buf[i];
  return Math.sqrt(sum / buf.length);
}

// ── Audio setup ───────────────────────────────────────────────
let animId = null;

async function startAudio() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  btn.textContent = 'Requesting access…';

  let stream;
  try {
    stream = await navigator.mediaDevices.getUserMedia({ audio: true, video: false });
  } catch (e) {
    btn.disabled = false;
    btn.textContent = '▶   Try again';
    document.getElementById('statusText').textContent = 'Microphone denied — check browser permissions';
    return;
  }

  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const source = ctx.createMediaStreamSource(stream);
  const analyser = ctx.createAnalyser();
  analyser.fftSize = 2048;
  source.connect(analyser);

  const bufLen = analyser.fftSize;
  const timeDomain = new Float32Array(bufLen);

  // Canvas
  const canvas = document.getElementById('waveCanvas');
  canvas.width = canvas.offsetWidth * devicePixelRatio;
  canvas.height = canvas.offsetHeight * devicePixelRatio;
  const cc = canvas.getContext('2d');

  // UI elements
  const noteName    = document.getElementById('noteName');
  const noteOctave  = document.getElementById('noteOctave');
  const freqValue   = document.getElementById('freqValue');
  const centsNeedle = document.getElementById('centsNeedle');
  const centsValue  = document.getElementById('centsValue');
  const volFill     = document.getElementById('volFill');
  const clarityVal  = document.getElementById('clarityValue');
  const pitchCard   = document.getElementById('pitchCard');
  const statusDot   = document.getElementById('statusDot');
  const statusText  = document.getElementById('statusText');

  statusDot.className = 'dot live';
  statusText.textContent = 'Listening';

  const SILENCE_THRESHOLD = 0.01;
  const CLARITY_THRESHOLD = 0.85;

  function loop() {
    animId = requestAnimationFrame(loop);
    analyser.getFloatTimeDomainData(timeDomain);

    // Volume
    const vol = rms(timeDomain);
    const volPct = Math.min(100, vol * 400);
    volFill.style.width = volPct + '%';

    // Pitch
    const { freq, clarity } = yin(timeDomain, ctx.sampleRate);
    const isSilent = vol < SILENCE_THRESHOLD || clarity < CLARITY_THRESHOLD || freq < 0;

    clarityVal.textContent = clarity > 0 ? (clarity * 100).toFixed(0) + '%' : '—';

    if (isSilent) {
      noteName.className = 'note-name silent';
      noteName.innerHTML = '—<span class="note-octave" id="noteOctave"></span>';
      freqValue.textContent = '—';
      centsNeedle.className = 'cents-needle silent';
      centsNeedle.style.left = '50%';
      centsValue.textContent = '— ¢';
      pitchCard.classList.remove('active');
    } else {
      const note = freqToNote(freq);
      noteName.className = 'note-name';
      noteName.innerHTML = `${note.name}<span class="note-octave">${note.octave}</span>`;
      freqValue.textContent = freq.toFixed(1);
      pitchCard.classList.add('active');

      const pct = 50 + (note.cents / 100) * 50;
      const inTune = Math.abs(note.cents) <= 5;
      centsNeedle.style.left = pct + '%';
      centsNeedle.className = 'cents-needle' + (inTune ? ' in-tune' : '');
      centsValue.textContent = (note.cents >= 0 ? '+' : '') + note.cents + ' ¢';
    }

    // Waveform
    const W = canvas.width, H = canvas.height;
    cc.clearRect(0, 0, W, H);
    cc.beginPath();
    cc.strokeStyle = isSilent ? '#1e1e2e' : '#e8ff47';
    cc.lineWidth = devicePixelRatio * 1.5;
    const step = W / bufLen;
    for (let i = 0; i < bufLen; i++) {
      const x = i * step;
      const y = (1 - (timeDomain[i] * 0.7 + 1) / 2) * H;
      i === 0 ? cc.moveTo(x, y) : cc.lineTo(x, y);
    }
    cc.stroke();
  }

  loop();
}
// ── Piano keyboard C4–C5 ──────────────────────────────────────
(function buildPiano() {
  // Notes in order: white keys get rendered in flex, black keys positioned absolutely
  const keys = [
    { note: 'C',  octave: 4, type: 'white' },
    { note: 'C#', octave: 4, type: 'black', offset: 1 },
    { note: 'D',  octave: 4, type: 'white' },
    { note: 'D#', octave: 4, type: 'black', offset: 2 },
    { note: 'E',  octave: 4, type: 'white' },
    { note: 'F',  octave: 4, type: 'white' },
    { note: 'F#', octave: 4, type: 'black', offset: 4 },
    { note: 'G',  octave: 4, type: 'white' },
    { note: 'G#', octave: 4, type: 'black', offset: 5 },
    { note: 'A',  octave: 4, type: 'white' },
    { note: 'A#', octave: 4, type: 'black', offset: 6 },
    { note: 'B',  octave: 4, type: 'white' },
    { note: 'C',  octave: 5, type: 'white' },
  ];

  // Midi note → frequency
  function midiToFreq(midi) { return 440 * Math.pow(2, (midi - 69) / 12); }
  function noteToMidi(note, octave) {
    return NOTE_NAMES.indexOf(note) + (octave + 1) * 12;
  }

  const container = document.getElementById('pianoKeys');
  const WHITE_COUNT = keys.filter(k => k.type === 'white').length; // 8

  keys.forEach(k => {
    const btn = document.createElement('button');
    btn.className = 'key ' + k.type;
    btn.dataset.note   = k.note;
    btn.dataset.octave = k.octave;

    if (k.type === 'black') {
      // Position black key between the correct white keys.
      // Each white key occupies (100 / WHITE_COUNT)% width.
      const pct = 100 / WHITE_COUNT;
      btn.style.left = (k.offset * pct - pct * 0.35) + '%';
    }

    const label = document.createElement('span');
    label.className = 'key-label';
    label.textContent = k.note + k.octave;
    btn.appendChild(label);

    btn.addEventListener('mousedown', () => pianoPlay(k.note, k.octave, btn));
    btn.addEventListener('touchstart', e => { e.preventDefault(); pianoPlay(k.note, k.octave, btn); }, { passive: false });

    container.appendChild(btn);
  });

  let pianoCtx = null;

  function pianoPlay(note, octave, btn) {
    // Reuse existing AudioContext if available, or create a standalone one
    if (!pianoCtx) pianoCtx = new (window.AudioContext || window.webkitAudioContext)();

    const freq = midiToFreq(noteToMidi(note, octave));
    const now  = pianoCtx.currentTime;

    // Simple sine + triangle blend for a soft piano-ish tone
    const osc1 = pianoCtx.createOscillator();
    const osc2 = pianoCtx.createOscillator();
    const gain = pianoCtx.createGain();

    osc1.type = 'triangle';
    osc2.type = 'sine';
    osc1.frequency.value = freq;
    osc2.frequency.value = freq;

    gain.gain.setValueAtTime(0.35, now);
    gain.gain.exponentialRampToValueAtTime(0.001, now + 1.4);

    osc1.connect(gain);
    osc2.connect(gain);
    gain.connect(pianoCtx.destination);

    osc1.start(now); osc1.stop(now + 1.4);
    osc2.start(now); osc2.stop(now + 1.4);

    // Visual feedback
    btn.classList.add('playing');
    setTimeout(() => btn.classList.remove('playing'), 300);

    // Feed the detected note display so the existing UI reacts
    const noteName   = document.getElementById('noteName');
    const freqValue  = document.getElementById('freqValue');
    noteName.className = 'note-name';
    noteName.innerHTML = `${note}<span class="note-octave">${octave}</span>`;
    freqValue.textContent = freq.toFixed(1);
    document.getElementById('pitchCard').classList.add('active');
  }
})();
// ── Audio file loader ─────────────────────────────────────────
// Exposes `audioFile` object for future playback/loop/pitch steps.
const audioFile = {
  ctx:        null,   // AudioContext (created on first load)
  buffer:     null,   // decoded AudioBuffer
  source:     null,   // current BufferSourceNode (set on play)
  gainNode:   null,   // master gain (set on load)
  fileName:   null,   // original filename string
  duration:   0,      // seconds
};

document.getElementById('audioFileInput').addEventListener('change', async function (e) {
  const file = e.target.files[0];
  if (!file) return;

  document.getElementById('uploadFilename').textContent = 'Loading…';

  // Create (or reuse) a dedicated AudioContext for file playback
  if (!audioFile.ctx) {
    audioFile.ctx = new (window.AudioContext || window.webkitAudioContext)();
    audioFile.gainNode = audioFile.ctx.createGain();
    audioFile.gainNode.connect(audioFile.ctx.destination);
  }

  try {
    const arrayBuffer = await file.arrayBuffer();
    const decoded     = await audioFile.ctx.decodeAudioData(arrayBuffer);

    audioFile.buffer   = decoded;
    audioFile.duration = decoded.duration;
    audioFile.fileName = file.name;

    document.getElementById('uploadFilename').textContent =
      file.name + '  ·  ' + formatDuration(decoded.duration);

  } catch (err) {
    document.getElementById('uploadFilename').textContent = 'Error decoding file';
    console.error('Audio decode error:', err);
  }

  // Reset input so the same file can be re-loaded if needed
  e.target.value = '';
});

function formatDuration(secs) {
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60).toString().padStart(2, '0');
  return m + ':' + s;
}
// ── Playback controls ─────────────────────────────────────────
// Uses audioFile.buffer / .ctx / .gainNode set by the upload step.
// Tracks position manually (BufferSourceNode doesn't support pause).

const playback = {
  isPlaying:   false,
  startedAt:   0,     // audioFile.ctx.currentTime when play was called
  pausedAt:    0,     // audioFile.duration-relative offset when paused
  timerId:     null,  // setInterval id for clock display
};

// Called by the upload step after a file is decoded — enables the button.
const _origFileInput = document.getElementById('audioFileInput');
_origFileInput.addEventListener('change', function () {
  // Wait one tick so the upload handler decodes first
  setTimeout(() => {
    const btn = document.getElementById('playPauseBtn');
    if (audioFile.buffer) {
      btn.disabled = false;
      playback.pausedAt = 0;
      updatePlaybackTime(0);
    }
  }, 300);
});

function togglePlayback() {
  if (!audioFile.buffer) return;
  playback.isPlaying ? pauseAudioFile() : playAudioFile();
}

function playAudioFile() {
  if (!audioFile.buffer || playback.isPlaying) return;

  // Resume suspended context (browser autoplay policy)
  if (audioFile.ctx.state === 'suspended') audioFile.ctx.resume();

  const source = audioFile.ctx.createBufferSource();
  source.buffer = audioFile.buffer;
  source.connect(audioFile.gainNode);

  source.start(0, playback.pausedAt);
  playback.startedAt = audioFile.ctx.currentTime - playback.pausedAt;
  playback.isPlaying = true;
  audioFile.source   = source;   // expose for future steps (A/B loop, etc.)

  source.onended = () => {
    // Only treat as natural end if we didn't pause manually
    if (playback.isPlaying) stopAudioFile();
  };

  document.getElementById('playPauseBtn').textContent = '⏸ Pause';
  startClock();
}

function pauseAudioFile() {
  if (!playback.isPlaying) return;
  playback.pausedAt = audioFile.ctx.currentTime - playback.startedAt;
  audioFile.source.onended = null;  // prevent stopAudioFile firing
  audioFile.source.stop();
  playback.isPlaying = false;
  document.getElementById('playPauseBtn').textContent = '▶ Play';
  stopClock();
}

function stopAudioFile() {
  playback.isPlaying = false;
  playback.pausedAt  = 0;
  if (audioFile.source) { audioFile.source.onended = null; audioFile.source.stop(); }
  document.getElementById('playPauseBtn').textContent = '▶ Play';
  stopClock();
  updatePlaybackTime(0);
}

// Clock display
function startClock() {
  stopClock();
  playback.timerId = setInterval(() => {
    if (!playback.isPlaying) return;
    const elapsed = audioFile.ctx.currentTime - playback.startedAt;
    updatePlaybackTime(Math.min(elapsed, audioFile.duration));
  }, 250);
}

function stopClock() {
  clearInterval(playback.timerId);
  playback.timerId = null;
}

function updatePlaybackTime(elapsed) {
  document.getElementById('playbackTime').textContent =
    formatDuration(elapsed) + ' / ' + formatDuration(audioFile.duration);
}
// ── Scrub bar ─────────────────────────────────────────────────
const scrubSlider = document.getElementById('scrubSlider');
let isScrubbing = false;

// User starts dragging
scrubSlider.addEventListener('mousedown',  () => { isScrubbing = true; });
scrubSlider.addEventListener('touchstart', () => { isScrubbing = true; }, { passive: true });

// User releases — seek to new position
scrubSlider.addEventListener('mouseup',  commitScrub);
scrubSlider.addEventListener('touchend', commitScrub);

function commitScrub() {
  if (!audioFile.buffer) return;
  const wasPlaying = playback.isPlaying;
  if (wasPlaying) pauseAudioFile();
  playback.pausedAt = (scrubSlider.value / 100) * audioFile.duration;
  isScrubbing = false;
  if (wasPlaying) playAudioFile();
  updatePlaybackTime(playback.pausedAt);
}

// Patch the clock so it also drives the scrub slider
const _origStartClock = startClock;
startClock = function () {
  _origStartClock();
  // Piggyback on the existing 250ms interval via a parallel one
  playback.scrubTimerId = setInterval(() => {
    if (!playback.isPlaying || isScrubbing) return;
    const elapsed = audioFile.ctx.currentTime - playback.startedAt;
    scrubSlider.value = Math.min((elapsed / audioFile.duration) * 100, 100);
  }, 250);
};

const _origStopClock = stopClock;
stopClock = function () {
  _origStopClock();
  clearInterval(playback.scrubTimerId);
};

// Enable slider and reset when a new file loads
const _scrubFileInput = document.getElementById('audioFileInput');
_scrubFileInput.addEventListener('change', () => {
  setTimeout(() => {
    if (audioFile.buffer) {
      scrubSlider.disabled = false;
      scrubSlider.value = 0;
    }
  }, 350); // slightly after the upload handler's own 300ms timeout
});

// Reset slider when playback reaches natural end
const _origStopAudioFile = stopAudioFile;
stopAudioFile = function () {
  _origStopAudioFile();
  scrubSlider.value = 0;
};
// ── A/B loop marker state ─────────────────────────────────────
const loop = {
  A: null,   // seconds | null
  B: null,   // seconds | null
};

function setLoopPoint(point) {
  if (!audioFile.buffer) return;

  // Current playback position in seconds
  const now = playback.isPlaying
    ? audioFile.ctx.currentTime - playback.startedAt
    : playback.pausedAt;

  if (point === 'A') {
    // If B is already set, don't allow A to be placed after it
    if (loop.B !== null && now >= loop.B) return;
    loop.A = now;
    document.getElementById('setABtn').classList.add('set');

  } else {
    // If A is already set, don't allow B to be placed before it
    if (loop.A !== null && now <= loop.A) return;
    loop.B = now;
    document.getElementById('setBBtn').classList.add('set');
  }

  updateAbDisplay();
}

function clearLoopPoints() {
  loop.A = null;
  loop.B = null;
  document.getElementById('setABtn').classList.remove('set');
  document.getElementById('setBBtn').classList.remove('set');
  updateAbDisplay();
}

function updateAbDisplay() {
  const aText = loop.A !== null ? formatDuration(loop.A) : '—';
  const bText = loop.B !== null ? formatDuration(loop.B) : '—';
  const spans = document.getElementById('abDisplay').querySelectorAll('span');
  spans[0].textContent = aText;
  spans[1].textContent = bText;
}

// Enable A/B buttons when a file is loaded (piggyback on upload event)
document.getElementById('audioFileInput').addEventListener('change', () => {
  setTimeout(() => {
    if (audioFile.buffer) {
      document.getElementById('setABtn').disabled = false;
      document.getElementById('setBBtn').disabled = false;
      clearLoopPoints(); // reset markers on new file
    }
  }, 360); // just after scrub bar's 350ms timeout
});
// ── A/B loop engine ───────────────────────────────────────────
let abLoopEnabled = true;

setInterval(() => {
  if (!abLoopEnabled) return;
  if (!playback.isPlaying) return;
  if (loop.A === null || loop.B === null) return;

  const now = audioFile.ctx.currentTime - playback.startedAt;

  if (now >= loop.B) {
    pauseAudioFile();
    playback.pausedAt = loop.A;
    playAudioFile();
  }
}, 100);
</script>
